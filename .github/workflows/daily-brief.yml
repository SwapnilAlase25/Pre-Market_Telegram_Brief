name: Daily Pre-Market Brief

on:
  schedule:
    # 8:15 AM IST target (03:00 UTC minus buffer for cron lag) = 02:45 UTC, weekdays only
    # Re-saved after the repo rename to re-register the schedule with GitHub
    # (renames can leave a previously-registered cron stale).
    - cron: "45 2 * * 1-5"
  workflow_dispatch: {}

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market brief
        working-directory: src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py
